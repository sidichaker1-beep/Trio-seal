<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIO SEAL · Cosmic Observatory</title>
<style>
/* ===================== Reset & Body ===================== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
body{background:#f5f7fa;color:#1e293b;min-height:100vh;padding:2rem;}
.container{max-width:1400px;margin:0 auto;background:white;border-radius:40px;padding:2rem;box-shadow:0 10px 30px rgba(0,0,0,0.05);}

/* ===================== Navbar ===================== */
.navbar{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;background:#f8fafc;border-radius:60px;margin-bottom:2rem;border:1px solid #e2e8f0;}
.logo{font-size:1.8rem;font-weight:bold;color:#0f2b4f;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:#334155;text-decoration:none;font-weight:500;}
.nav-links a:hover{color:#fbbf24;}
.language-selector{position:relative;}
.lang-btn{background:#e2e8f0;border:1px solid #cbd5e1;padding:0.5rem 1rem;border-radius:30px;cursor:pointer;display:flex;align-items:center;gap:0.5rem;}
.lang-menu{position:absolute;top:100%;right:0;background:white;border:1px solid #e2e8f0;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.1);display:none;z-index:100;min-width:150px;}
.lang-option{padding:0.7rem 1rem;cursor:pointer;border-bottom:1px solid #e2e8f0;}
.lang-option:hover{background:#fbbf24;color:#0f2b4f;}

/* ===================== News Ticker ===================== */
.news-ticker{background:#0f2b4f;color:white;padding:10px 20px;border-radius:50px;margin-bottom:20px;overflow:hidden;white-space:nowrap;position:relative;}
.news-ticker-content{display:inline-block;animation:ticker 30s linear infinite;color:#fbbf24;}
.news-ticker-content span{margin-right:30px;color:white;}
@keyframes ticker{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}

#cosmic-time-bar{background:#0f2b4f;color:#fbbf24;padding:12px 20px;display:flex;justify-content:space-around;border-radius:60px;margin-bottom:20px;font-family:'Courier New', monospace;font-weight:bold;border:1px solid #fbbf24;flex-wrap:wrap;gap:10px;}
#cosmic-time-bar span{color:white;}
#cosmic-time-bar .utc-clock{color:#4ade80;}
#cosmic-time-bar .mecca-clock{color:#fbbf24;}

h1{font-size:2.5rem;font-weight:400;margin-bottom:0.5rem;color:#0f2b4f;}
.subtitle{color:#475569;margin-bottom:2rem;font-size:1.1rem;border-left:4px solid #f0b37b;padding-left:1rem;}

/* ===================== Grids ===================== */
.core-grid,.forecast-grid,.historical-grid,.images-grid,.source-grid,.indicators-grid{display:grid;gap:1.5rem;}
.core-grid{grid-template-columns:repeat(3,1fr);}
.forecast-grid{grid-template-columns:repeat(3,1fr);margin-top:1rem;}
.historical-grid{grid-template-columns:repeat(2,1fr);}
.images-grid{grid-template-columns:repeat(3,1fr);margin:2rem 0;}
.source-grid{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));margin:1rem 0 2rem;}
.indicators-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:2rem;}

/* ===================== Cards ===================== */
.card,.core-card,.forecast-card,.historical-card,.source-card{background:#0f2b4f;border:1px solid #fbbf24;border-radius:20px;padding:1.5rem;box-shadow:0 8px 16px rgba(0,0,0,0.2);transition:transform 0.2s;}
.card:hover,.core-card:hover,.forecast-card:hover,.historical-card:hover,.source-card:hover{transform:translateY(-5px);border-color:#4ade80;}
.card-header,.core-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.card-title,.core-title{color:#fbbf24;background:rgba(255,255,255,0.1);border:1px solid #fbbf24;padding:0.3rem 1rem;border-radius:30px;font-size:1.1rem;font-weight:500;}
.card-value,.core-value{background:rgba(0,0,0,0.3);color:#4ade80;border:2px solid #4ade80;padding:0.2rem 0.8rem;border-radius:12px;font-family:'Courier New', monospace;font-size:1.5rem;font-weight:bold;min-width:80px;text-align:center;}
.card-value.live{color:#4ade80 !important;border-color:#4ade80 !important;}
.card-value.mizan{color:#4ade80 !important;border-color:#4ade80 !important;}
#taqabul-value{color:#ef4444 !important;border-color:#ef4444 !important;}
.gauge,.core-gauge{background:rgba(255,255,255,0.2);height:8px;border-radius:10px;margin:1rem 0;overflow:hidden;}
.gauge-fill,.core-gauge-fill{height:100%;border-radius:10px;transition:width 0.5s ease;}
.gauge-fill.live,.core-gauge-fill.live{background:#4ade80 !important;}
.gauge-fill.mizan,.core-gauge-fill.mizan{background:#4ade80 !important;}
#taqabul-gauge{background:#ef4444 !important;}
#closure-gauge,#balance-gauge{background:#4ade80 !important;}
.status{color:#94a3b8;font-size:0.8rem;margin-top:0.5rem;display:flex;justify-content:space-between;}
.status-badge{background:rgba(255,255,255,0.1);color:#fbbf24;padding:0.2rem 0.6rem;border-radius:20px;font-size:0.7rem;}
.status-badge.live{background:#4ade80 !important;color:white !important;}
.status-badge.mizan{background:#4ade80 !important;color:#0f2b4f !important;}
.moon-phase{background:#0f2b4f;border-radius:30px;padding:1.5rem;margin:2rem 0;display:flex;align-items:center;gap:2rem;color:white;}
.moon-icon{font-size:4rem;}
.moon-info h3{color:#fbbf24;margin-bottom:0.5rem;}
.moon-percent{font-size:1.5rem;font-weight:bold;color:#4ade80;}
.moon-thickness{font-size:0.9rem;color:#94a3b8;}
.quick-links{display:flex;gap:0.5rem;flex-wrap:wrap;margin:1rem 0;}
.quick-link{background:#e2e8f0;padding:0.5rem 1rem;border-radius:30px;text-decoration:none;color:#334155;font-size:0.9rem;border:1px solid #cbd5e1;transition:all 0.2s;}
.quick-link:hover{background:#fbbf24;color:#0f2b4f;transform:translateY(-2px);}
.footer{margin-top:3rem;text-align:center;color:#64748b;padding:1rem;border-top:1px solid #e2e8f0;}
.live-badge{background:#4ade80;color:white;padding:0.2rem 0.8rem;border-radius:20px;font-size:0.7rem;display:inline-block;}
.mizan-badge{background:#4ade80;color:#0f2b4f;padding:0.2rem 0.8rem;border-radius:20px;font-size:0.7rem;display:inline-block;font-weight:bold;}
.section-title{color:#0f2b4f;font-size:1.8rem;margin:2rem 0 1rem;border-bottom:2px solid #e2e8f0;padding-bottom:0.5rem;}
</style>
</head>
<body>
<div class="container">
<!-- Navigation, Ticker, Time Bar, Core Indicators, Forecast, Moon Phase, Sources, Live Images, Historical, Earthquakes... (كما في القالب المقدم) -->

<!-- Quick Links Dynamic Example -->
<div id="quick-links-container" class="quick-links"></div>

</div>

<script>
// ===================== Language System =====================
const translations={/* كما في الكود المقدم أعلاه */};
let currentLanguage='en';
function toggleLanguageMenu(){const menu=document.getElementById('language-menu');menu.style.display=menu.style.display==='block'?'none':'block';}
document.addEventListener('click',function(event){const menu=document.getElementById('language-menu');const btn=document.querySelector('.lang-btn');if(!btn.contains(event.target)&&!menu.contains(event.target)){menu.style.display='none';}});
function setLanguage(lang){currentLanguage=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';document.querySelectorAll('[data-key]').forEach(el=>{const key=el.getAttribute('data-key');if(translations[lang]&&translations[lang][key]){el.innerText=translations[lang][key];}});document.getElementById('language-menu').style.display='none';}

// ===================== Quick Links Auto-Generation =====================
const quickLinks=[
{name:"NOAA Space Weather",url:"https://www.swpc.noaa.gov/"},
{name:"Aurora Forecast",url:"https://www.swpc.noaa.gov/ovation-aurora-forecast"},
{name:"GOES X-Ray Flux",url:"https://www.swpc.noaa.gov/rt-xray"},
{name:"Planetary K-Index",url:"https://www.swpc.noaa.gov/products/noaa-planetary-k-index"},
{name:"Solar Data",url:"https://services.swpc.noaa.gov/json/goes/primary/xrays-1-day.json"},
{name:"Earthquakes USGS",url:"https://earthquake.usgs.gov/earthquakes/map/"}
];
const quickContainer=document.getElementById('quick-links-container');
quickLinks.forEach(link=>{const a=document.createElement('a');a.href=link.url;a.target="_blank";a.rel="noopener noreferrer";a.className="quick-link";a.innerText=link.name;quickContainer.appendChild(a);});

// ===================== Tooltips =====================
document.querySelectorAll('[data-tooltip]').forEach(el=>{el.addEventListener('mouseenter',()=>{const tip=document.createElement('div');tip.className='tooltip';tip.innerText=el.getAttribute('data-tooltip');document.body.appendChild(tip);const rect=el.getBoundingClientRect();tip.style.position='fixed';tip.style.left=rect.left+'px';tip.style.top=(rect.top-30)+'px';tip.style.background='#0f2b4f';tip.style.color='white';tip.style.padding='5px 10px';tip.style.borderRadius='5px';tip.style.zIndex='1000';el._tooltip=tip;});el.addEventListener('mouseleave',()=>{if(el._tooltip){document.body.removeChild(el._tooltip);el._tooltip=null;}});});

// ===================== Live Indicators Simulation =====================
function updateIndicators(){
['taqabul','closure','balance'].forEach(id=>{
const val=Math.floor(Math.random()*100);document.getElementById(id+'-value').innerText=val;document.getElementById(id+'-gauge').style.width=val+'%';
});
}
setInterval(updateIndicators,30000);updateIndicators();
</script>
</body>
</html>
