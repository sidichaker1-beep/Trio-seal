<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIO SEAL · Cosmic Observatory</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

.moon-phase {
    background: #0f2b4f;
    padding: 20px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
}

.moon-icon {
    font-size: 60px;
}

.moon-percent {
    color: #4ade80;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🌌 TRIO SEAL · Cosmic Observatory</h1>

<!-- 🌙 MOON -->
<div class="moon-phase">
    <div class="moon-icon" id="moon-icon">🌑</div>
    <div>
        <h3>Moon Phase</h3>
        <div>
            <span id="moon-phase-name">New Moon</span> · 
            <span class="moon-percent" id="moon-illumination">0%</span>
        </div>
        <div id="moon-age">Age: 0 days</div>
    </div>
</div>

<br>

<!-- ⏰ TIME -->
<div>
    UTC: <span id="utc-clock">--</span><br>
    Mecca: <span id="mecca-clock">--</span>
</div>

</div>

<script>

// ================== LANGUAGE ==================
let currentLanguage = 'en';

// ================== 🌙 MOON PHASE (FIXED) ==================
function updateMoonPhase() {
    const now = Date.now();

    const knownNewMoon = Date.UTC(2024, 3, 8, 18, 20);
    const synodicMonth = 29.530588853;

    const daysSince = (now - knownNewMoon) / (1000 * 60 * 60 * 24);
    const ageInDays = ((daysSince % synodicMonth) + synodicMonth) % synodicMonth;
    const phase = ageInDays / synodicMonth;

    let icon, phaseName;

    if (ageInDays < 1) {
        icon = '🌑'; phaseName = 'New Moon';
    } else if (ageInDays < 7.4) {
        icon = '🌒'; phaseName = 'Waxing Crescent';
    } else if (ageInDays < 14.8) {
        icon = '🌓'; phaseName = 'First Quarter';
    } else if (ageInDays < 22.1) {
        icon = '🌔'; phaseName = 'Waxing Gibbous';
    } else if (ageInDays < 29.5) {
        icon = '🌕'; phaseName = 'Full Moon';
    } else {
        icon = '🌘'; phaseName = 'Waning Crescent';
    }

    let illumination = 0;
    if (phase <= 0.5) {
        illumination = phase * 2 * 100;
    } else {
        illumination = (1 - phase) * 2 * 100;
    }

    document.getElementById('moon-icon').innerText = icon;
    document.getElementById('moon-phase-name').innerText = phaseName;
    document.getElementById('moon-illumination').innerText = Math.round(illumination) + '%';
    document.getElementById('moon-age').innerText = `Age: ${Math.round(ageInDays)} days`;

    if (currentLanguage === 'ar') {
        document.getElementById('moon-age').innerText =
            document.getElementById('moon-age').innerText.replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);

        document.getElementById('moon-illumination').innerText =
            document.getElementById('moon-illumination').innerText.replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
    }
}

// ================== ⏰ TIME ==================
function updateTime() {
    const now = new Date();

    document.getElementById('utc-clock').innerText =
        now.getUTCHours().toString().padStart(2,'0') + ':' +
        now.getUTCMinutes().toString().padStart(2,'0') + ':' +
        now.getUTCSeconds().toString().padStart(2,'0');

    const mecca = new Date(now.getTime() + (3 * 60 * 60 * 1000));

    document.getElementById('mecca-clock').innerText =
        mecca.getUTCHours().toString().padStart(2,'0') + ':' +
        mecca.getUTCMinutes().toString().padStart(2,'0') + ':' +
        mecca.getUTCSeconds().toString().padStart(2,'0');
}

// ================== 🚀 START ==================
function start() {
    updateMoonPhase();
    updateTime();

    setInterval(updateMoonPhase, 60000);
    setInterval(updateTime, 1000);
}

start();

</script>

</body>
</html>
