<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIO SEAL · All-in-One Cosmic Platform · Live Feeds</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ==================== DESIGN TOKENS ==================== */
:root {
  --bg: #03080f;
  --panel: rgba(4, 18, 44, 0.92);
  --bdr: rgba(0, 180, 255, 0.28);
  --bdr-gold: rgba(255, 215, 0, 0.32);
  --gold: #ffd700;
  --cyan: #00d4ff;
  --live: #00ff88;
  --alert: #ff3333;
  --warn: #ff7700;
  --yellow: #ffcc00;
  --muted: #6888aa;
  --white: #e8f4ff;
  --f-hud: 'Orbitron', sans-serif;
  --f-data: 'Rajdhani', sans-serif;
  --f-mono: 'Share Tech Mono', monospace;
  --radius: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--white); font-family: var(--f-data); min-height: 100vh; padding: 0 0 72px; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 45% at 50% -5%, rgba(0,80,180,.35), transparent 70%), radial-gradient(ellipse 55% 40% at 15% 85%, rgba(0,40,120,.22), transparent 60%); pointer-events: none; }
.wrap { max-width: 1420px; margin: 0 auto; padding: 12px 14px; position: relative; z-index: 1; }
[data-link] { cursor: pointer; transition: all 0.2s ease; }
[data-link]:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0,200,255,.3); }
.panel { background: var(--panel); backdrop-filter: blur(14px); border: 1px solid var(--bdr); border-radius: var(--radius); transition: all 0.3s ease; position: relative; overflow: hidden; }
.phdr { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: linear-gradient(90deg, rgba(0,60,130,.65), rgba(0,30,80,.4)); border-bottom: 1px solid var(--bdr); font-family: var(--f-hud); font-size: .68rem; letter-spacing: 2px; color: var(--cyan); font-weight: 600; }
.live-badge { background: rgba(0,255,136,.2); color: var(--live); font-size: .6rem; padding: 2px 6px; border-radius: 20px; margin-left: 8px; }
body.red-mode { --bg: #1a0303; --panel: rgba(80,20,20,0.92); --bdr: rgba(255,50,50,0.5); --gold: #ff6666; --cyan: #ff8888; --live: #ff5555; }
.red-mode-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(255,0,0,0.15), transparent 70%); pointer-events: none; z-index: 999; animation: pulse-red 2s infinite; }
@keyframes pulse-red { 0%,100%{ opacity: 0.3; } 50%{ opacity: 0.8; } }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 14px; }
.sec-title { font-family: var(--f-hud); color: var(--gold); font-size: 1.3rem; margin: 20px 0 12px; border-bottom: 1px solid rgba(255,215,0,.2); padding-bottom: 6px; }
.core-card { padding: 16px 18px; }
.core-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.core-title { font-family: var(--f-hud); font-size: .8rem; background: rgba(255,255,255,.07); border: 1px solid var(--bdr-gold); color: var(--gold); padding: .25rem .9rem; border-radius: 60px; }
.core-value { font-family: var(--f-mono); font-size: 1.5rem; font-weight: 700; background: rgba(0,0,0,.3); border: 2px solid; padding: .15rem .7rem; border-radius: 10px; min-width: 76px; text-align: center; }
.core-value.v-taq { color: var(--alert); border-color: var(--alert); }
.core-value.v-live { color: var(--live); border-color: var(--live); }
.core-value.v-mizan { color: var(--gold); border-color: var(--gold); }
.gauge-track { height: 7px; background: rgba(255,255,255,.09); border-radius: 99px; overflow: hidden; margin: 10px 0 6px; }
.gauge-fill { height: 100%; border-radius: 99px; transition: width .6s ease; width: 0%; }
.gf-live { background: linear-gradient(90deg,#00ff88,#00cc66); }
.gf-mizan { background: linear-gradient(90deg,#ffd700,#e6b800); }
.gf-taq { background: linear-gradient(90deg,#ef4444,#b91c1c); }
.live-img { width: 100%; height: 110px; object-fit: cover; display: block; background: #030a18; transition: all 0.3s ease; }
.live-img:hover { filter: brightness(1.1); transform: scale(1.02); }
.solar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 14px; }
.main-row { display: grid; grid-template-columns: 290px 1fr 300px; gap: 12px; margin-bottom: 14px; }
.quick-links { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.quick-link { background: rgba(0,100,200,.2); border: 1px solid var(--bdr); padding: 5px 14px; border-radius: 60px; cursor: pointer; font-size: .8rem; transition: all 0.2s; }
.quick-link:hover { background: rgba(0,200,255,.3); transform: translateY(-1px); }
.badge { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: .68rem; font-weight: 700; font-family: var(--f-hud); }
.badge-live { background: rgba(0,255,136,.14); color: var(--live); border: 1px solid rgba(0,255,136,.4); }
.badge-mizan { background: rgba(255,215,0,.13); color: var(--gold); border: 1px solid rgba(255,215,0,.4); }
