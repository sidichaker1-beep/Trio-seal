<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIO SEAL - Moon Visual</title>
<style>
  body {
    background-color: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: sans-serif;
  }
  #moonCanvas {
    border-radius: 50%;
    box-shadow: 0 0 15px rgba(255, 235, 190, 0.3);
  }
</style>
</head>
<body>

<canvas id="moonCanvas"></canvas>

<script>
const SYNODIC = 29.53059; // طول الدورة الاقترانية للقمر بالأيام

// ==================== محاكاة البيانات ====================
function getMoonAge() {
  // مثال تجريبي: يوم 8 من الشهر القمري
  return 8;
}

function getMoonIllumination() {
  // مثال تجريبي: 29.5% إضاءة
  return 29.5;
}

// ==================== الرسم الرئيسي ====================
function drawRealMoonCanvas() {
  const canvas = document.getElementById('moonCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const size = 120;
  canvas.width = size;
  canvas.height = size;
  const cx = size/2, cy = size/2, r = size/2 - 3;

  const illumination = getMoonIllumination() / 100; // 0.295
  const age = getMoonAge();
  const phase = age / SYNODIC;
  const isWaxing = phase < 0.5;

  // صورة القمر الأساسية
  const moonImage = new Image();
  moonImage.crossOrigin = 'Anonymous';
  moonImage.src = 'https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg';

  moonImage.onload = () => {
    ctx.clearRect(0, 0, size, size);

    // ==================== رسم القمر الكامل ====================
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(moonImage, 0, 0, size, size);
    ctx.restore();

    // ==================== تدرج الظل ====================
    const gradShadow = ctx.createLinearGradient(cx - r, cy, cx + r, cy);
    if (isWaxing) {
      gradShadow.addColorStop(0, 'rgba(0, 0, 0, 0.92)');
      gradShadow.addColorStop(illumination, 'rgba(0, 0, 0, 0.5)');
      gradShadow.addColorStop(illumination + 0.1, 'rgba(0, 0, 0, 0.2)');
      gradShadow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    } else {
      gradShadow.addColorStop(0, 'rgba(0, 0, 0, 0)');
      gradShadow.addColorStop(1 - illumination, 'rgba(0, 0, 0, 0.2)');
      gradShadow.addColorStop(1 - illumination + 0.1, 'rgba(0, 0, 0, 0.5)');
      gradShadow.addColorStop(1, 'rgba(0, 0, 0, 0.92)');
    }
    ctx.fillStyle = gradShadow;
    ctx.fillRect(0, 0, size, size);

    // ==================== إطار فضي ====================
    ctx.beginPath();
    ctx.arc(cx, cy, r - 0.5, 0, Math.PI * 2);
    ctx.strokeStyle = '#c0bcb0';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // ==================== توهج ذهبي على الجانب المضيء ====================
    const glowGrad = ctx.createLinearGradient(
      isWaxing ? cx + r * 0.5 : cx - r * 0.5,
      cy,
      isWaxing ? cx + r : cx - r,
      cy
    );
    glowGrad.addColorStop(0, `rgba(255, 235, 190, ${0.1 + illumination * 0.3})`);
    glowGrad.addColorStop(1, 'rgba(255, 235, 190, 0)');
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = glowGrad;
    ctx.fill();
  };

  moonImage.onerror = () => {
    drawSilverMoonFallback(ctx, size, cx, cy, r, illumination, phase);
  };

  if (moonImage.complete) moonImage.onload();
}

// ==================== Fallback فضي ====================
function drawSilverMoonFallback(ctx, size, cx, cy, r, illumination, phase) {
  ctx.clearRect(0, 0, size, size);

  const grad = ctx.createRadialGradient(cx - r*0.2, cy - r*0.2, r*0.1, cx, cy, r);
  grad.addColorStop(0, '#e8e4d8');
  grad.addColorStop(0.4, '#c0bcb0');
  grad.addColorStop(0.7, '#888070');
  grad.addColorStop(1, '#5a5848');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  const isWaxing = phase < 0.5;

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();

  let gradShadow;
  if (isWaxing) {
    gradShadow = ctx.createLinearGradient(cx - r, cy, cx + r, cy);
    gradShadow.addColorStop(0, 'rgba(0, 0, 0, 0.92)');
    gradShadow.addColorStop(illumination, 'rgba(0, 0, 0, 0.5)');
    gradShadow.addColorStop(illumination + 0.15, 'rgba(0, 0, 0, 0.2)');
    gradShadow.addColorStop(1, 'rgba(0, 0, 0, 0)');
  } else {
    gradShadow = ctx.createLinearGradient(cx - r, cy, cx + r, cy);
    gradShadow.addColorStop(0, 'rgba(0, 0, 0, 0)');
    gradShadow.addColorStop(1 - illumination, 'rgba(0, 0, 0, 0.2)');
    gradShadow.addColorStop(1 - illumination + 0.15, 'rgba(0, 0, 0, 0.5)');
    gradShadow.addColorStop(1, 'rgba(0, 0, 0, 0.92)');
  }

  ctx.fillStyle = gradShadow;
  ctx.fillRect(0, 0, size, size);
  ctx.restore();

  // إضافة فوهات
  const craters = [[0.2,0.3,0.08], [-0.25,0.15,0.06], [0.15,-0.2,0.07], [-0.1,-0.3,0.09]];
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  craters.forEach(([dx, dy, rad]) => {
    ctx.beginPath();
    ctx.arc(cx + dx * r, cy + dy * r, rad * r, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ==================== تنفيذ الرسم ====================
drawRealMoonCanvas();
</script>

</body>
</html>
